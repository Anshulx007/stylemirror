version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend.phase5
    ports:
      - "8000:8000"
    volumes:
      - backend-uploads:/app/uploads
      - backend-reports:/app/reports
      - backend-database:/app/database
    networks:
      - stylemirror-network

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend.phase5
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - stylemirror-network

volumes:
  backend-uploads:
  backend-reports:
  backend-database:

networks:
  stylemirror-network:
    driver: bridge
